# Development: PostgreSQL only. Run API locally with npm run dev.
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wedding_contracts_db_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wedding_contracts
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
